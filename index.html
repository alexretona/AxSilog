      <input type="date" id="m-date" style="margin-bottom:10px;" value="${menu?esc(menu.menu_date||''):new Date().toISOString().slice(0,10)}">
      <div class="toggle-row">
        <label class="fld" style="margin:0;">Set an order cutoff time?</label>
        <label class="switch"><input type="checkbox" id="m-cutoff-on" ${menu&&menu.cutoff_time?'checked':''}><span class="slider"></span></label>
      </div>
      <input type="time" id="m-cutoff" style="margin-bottom:10px;${menu&&menu.cutoff_time?'':'display:none;'}" value="${menu?esc(menu.cutoff_time||''):''}">
      <div id="builder"></div>
      <input type="text" id="f-name" placeholder="Food name" style="margin-top:8px;">
      <div class="row" style="margin-top:8px;">
        <input type="number" id="f-price" placeholder="&#8369; price" inputmode="numeric" style="flex:1;">
        <button id="f-add" style="flex-shrink:0;">+ Add</button>
      </div>
      <button id="m-publish" class="primary" style="width:100%; margin-top:12px;">Publish new menu</button>
    </div>
    ${menu?menuStatusCard(menu):''}
    <div class="card">
      <div class="row" style="justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">&#128179; Payment QR</h3>
        ${me.payment_qr_url?'<span class="pill p-conf">Set</span>':'<span class="pill p-pending">Missing</span>'}
      </div>
      <p class="muted" style="font-size:.78rem; margin:6px 0 8px;">Customers scan this to pay for delivered orders.</p>
      <div id="qr-current">${me.payment_qr_url?`<img src="${esc(me.payment_qr_url)}" alt="Your payment QR" style="max-width:180px; border:0.5px solid var(--border-2); border-radius:var(--radius-sm);">`:'<p class="muted" style="font-size:.82rem;">No QR uploaded yet.</p>'}</div>
      <label class="small-btn" style="display:inline-block; margin-top:10px; cursor:pointer;">${me.payment_qr_url?'Replace QR':'Upload QR'}<input type="file" accept="image/*" id="org-qr" style="display:none;"></label>
    </div>
    <div id="org-orders"></div>`;
  v.innerHTML=html;
  requestAnimationFrame(refitTitles);
  orgDraft=[];
  renderBuilder();
  $('f-add').onclick=()=>{const n=$('f-name'),p=$('f-price'); if(!n.value.trim())return; orgDraft.push({name:n.value.trim(),price:Number(p.value)||0}); n.value='';p.value='';renderBuilder();n.focus();};
  $('m-cutoff-on').onchange=e=>{ $('m-cutoff').style.display=e.target.checked?'block':'none'; };
  $('m-publish').onclick=publishMenu;
  const tg=$('m-toggle-open'); if(tg) tg.onclick=()=>toggleMenuOpen(menu);
  const qrIn=$('org-qr');
  if(qrIn) qrIn.onchange=async e=>{
    const f=e.target.files[0]; if(!f) return;
    const ok=await uploadQR(f);
    if(ok){ alert('Payment QR updated.'); viewOrganizer(); }
  };
  orgFilter={ date:'all', status:'all', team:'all' };
  orgSubTab='prepare';
  orgRevFilter={ food:'', dir:'desc' };
  loadOrgOrders(menu);
}

// Status card for the organizer's current menu, with a manual Close / Reopen control.
function menuStatusCard(menu){
  const closed=isClosed(menu);
  const manual = menu.is_open===false;
  const past = (menu.menu_date||todayKey()) < todayKey();
  let reason='';
  if(manual) reason='You closed this menu manually.';
  else if(past) reason='This menu\u2019s date has passed.';
  else if(closed && menu.cutoff_time) reason='Cutoff time ('+timeLabel(menu.cutoff_time)+') has passed.';
  else if(menu.cutoff_time) reason='Accepting orders until '+timeLabel(menu.cutoff_time)+'.';
  else reason='Accepting orders through end of '+fmtDate(menu.menu_date)+'.';
  const pill = closed
    ? '<span class="pill p-pending">&#128274; Closed</span>'
    : '<span class="pill p-conf">&#128275; Open</span>';
  // Reopen only makes sense while the menu's date is today or future
  // (reopening a past-dated menu wouldn't show in Browse anyway).
  const canReopen = manual && !past;
  let btn='';
  if(!closed){
    btn=`<button id="m-toggle-open" class="small-btn danger" style="margin-top:10px;">Close menu now</button>`;
  } else if(canReopen){
    btn=`<button id="m-toggle-open" class="small-btn" style="margin-top:10px;">Reopen menu</button>`;
  }
  return `<div class="card">
    <div class="row mc-head" style="justify-content:space-between; align-items:center; gap:8px;">
      <span class="mc-title" style="font-weight:500; white-space:nowrap; min-width:0; flex:0 1 auto; transform-origin:left center; display:inline-block;">Current menu \u00B7 ${fmtDate(menu.menu_date)}</span>
      <span style="flex:0 0 auto;">${pill}</span>
    </div>
    <p class="muted" style="margin:6px 0 0;">${reason}</p>
    ${btn}
  </div>`;
}

// Flip is_open and refresh the organizer view.
async function toggleMenuOpen(menu){
  if(!menu) return;
  const closingNow = menu.is_open!==false && !isClosed(menu);
  if(closingNow){
    const ok=await uiConfirm('Close menu?', 'Customers won\u2019t be able to place new orders for this menu. You can reopen it later today if needed.');
    if(!ok) return;
  }
  const {error}=await sb.from('menus').update({is_open: !(menu.is_open===false)}).eq('id',menu.id);
  if(error){ alert(error.message); return; }
  viewOrganizer();
}
function renderBuilder(){
  const el=$('builder'); if(!el) return;
  el.innerHTML=orgDraft.length?orgDraft.map((m,i)=>`<div class="row" style="padding:8px 0; border-bottom:0.5px solid var(--border);"><span style="flex:1;">${esc(m.name)}</span><span class="price">${peso(m.price)}</span><button class="small-btn d" data-i="${i}">\u2715</button></div>`).join(''):'<p class="muted" style="margin:4px 0;">Add items to the new menu below.</p>';
  el.querySelectorAll('.d').forEach(b=>b.onclick=()=>{orgDraft.splice(+b.dataset.i,1);renderBuilder();});
}
async function publishMenu(){
  if(!orgDraft.length){ alert('Add at least one item.'); return; }
  const cutoffOn=$('m-cutoff-on').checked;
  const cutoff=cutoffOn?($('m-cutoff').value||null):null;
  if(cutoffOn && !cutoff){ alert('Set a cutoff time, or turn the cutoff off.'); return; }
  const {data:menu,error}=await sb.from('menus').insert({
    organizer_id:me.id, menu_date:$('m-date').value.trim(), cutoff_time:cutoff, is_open:true
  }).select().single();
  if(error){ alert(error.message); return; }
  await sb.from('menu_items').insert(orgDraft.map(d=>({menu_id:menu.id,name:d.name,price:d.price})));
  alert('Menu published!');
  viewOrganizer();
}
async function loadOrgOrders(menu){
  const el=$('org-orders'); if(!el) return;
  const {data:orders}=await sb.from('orders').select('*').eq('organizer_id',me.id).order('created_at',{ascending:false});
  if(!orders||!orders.length){ el.innerHTML='<h3>Orders</h3><p class="muted">No orders yet.</p>'; return; }
  const ids=orders.map(o=>o.id);
  const {data:allItems}=await sb.from('order_items').select('*').in('order_id',ids);
  const byOrder={}; (allItems||[]).forEach(it=>{(byOrder[it.order_id]=byOrder[it.order_id]||[]).push(it);});

  // attach each customer's team/group (lives on the profile, not the order)
  const custIds=[...new Set(orders.map(o=>o.customer_id).filter(Boolean))];
  const {data:custProfiles}= custIds.length ? await sb.from('profiles').select('id,team').in('id',custIds) : {data:[]};
  const teamByCust={}; (custProfiles||[]).forEach(p=>{ teamByCust[p.id]=p.team||null; });
  orders.forEach(o=>{ o._team = teamByCust[o.customer_id] || 'No team'; });

  // split: active (still being handled) vs delivered (history)
  const active=orders.filter(o=>!o.delivered);
  const history=orders.filter(o=>o.delivered);

  // ----- sub-tab bar -----
  const reviewCount=orders.filter(o=>o.review_rating).length;
  const subTabs=[['prepare','Prepare',active.length],['incoming','Incoming',active.length],['history','History',history.length],['analytics','Analytics',reviewCount]];
  if(!subTabs.some(t=>t[0]===orgSubTab)) orgSubTab='prepare';
  const subbar=`<div class="subtabs">`+subTabs.map(([k,l,n])=>
    `<button class="${k===orgSubTab?'active':''}" data-sub="${k}">${l}<br><span class="subtab-count">${n}</span></button>`).join('')+`</div>`;

  // shared filters over ACTIVE orders
  const dateKeys=[...new Set(active.map(o=>dayKey(o.created_at)))].sort().reverse();
  if(orgFilter.date!=='all' && !dateKeys.includes(orgFilter.date)) orgFilter.date='all';
  const matchStatus=o=>{
    switch(orgFilter.status){
      case 'new': return o.status!=='confirmed';
      case 'confirmed': return o.status==='confirmed';
      default: return true;
    }
  };
  const matchDate=o=> orgFilter.date==='all' || dayKey(o.created_at)===orgFilter.date;
  const teamKeys=[...new Set(active.map(o=>o._team))].sort((a,b)=>{
    if(a==='No team') return 1; if(b==='No team') return -1; return a.localeCompare(b);
  });
  if(orgFilter.team!=='all' && !teamKeys.includes(orgFilter.team)) orgFilter.team='all';
  const matchTeam=o=> orgFilter.team==='all' || o._team===orgFilter.team;
  const shown=active.filter(o=>matchDate(o)&&matchStatus(o)&&matchTeam(o));

  function filterBar(showStatus){
    const dateChips=`<button class="chip ${orgFilter.date==='all'?'active':''}" data-f="date" data-v="all">All dates</button>`+
      dateKeys.map(k=>`<button class="chip ${orgFilter.date===k?'active':''}" data-f="date" data-v="${k}">${dayLabel(k)}</button>`).join('');
    let h=`<div class="filters"><div><p class="filter-lbl">Filter by date</p><div class="filter-grp">${dateChips}</div></div>`;
    if(teamKeys.length>1){
      const teamChips=`<button class="chip ${orgFilter.team==='all'?'active':''}" data-f="team" data-v="all">All teams</button>`+
        teamKeys.map(t=>`<button class="chip ${orgFilter.team===t?'active':''}" data-f="team" data-v="${esc(t)}">${esc(t)}</button>`).join('');
      h+=`<div><p class="filter-lbl">Filter by team / group</p><div class="filter-grp">${teamChips}</div></div>`;
    }
    if(showStatus){
      const statusOpts=[['all','All'],['new','New'],['confirmed','Confirmed']];
      const statusChips=statusOpts.map(([v,l])=>`<button class="chip ${orgFilter.status===v?'active':''}" data-f="status" data-v="${v}">${l}</button>`).join('');
      h+=`<div><p class="filter-lbl">Filter by status</p><div class="filter-grp">${statusChips}</div></div>`;
    }
    return h+`</div>`;
  }

  function activeCard(o){
    const statusPill=o.status==='confirmed'?'<span class="pill p-conf">Confirmed</span>':'<span class="pill p-new">New</span>';
    const itemLines=itemLinesHtml(byOrder[o.id])+deliveryLineHtml(o.delivery_fee);
    const actions = o.status==='confirmed'
      ? `<button class="small-btn unc" data-id="${o.id}">Undo confirm</button>
         <button class="small-btn deliver dv" data-id="${o.id}">Delivered</button>`
      : `<button class="small-btn cf" data-id="${o.id}">Confirm</button>
         <button class="small-btn deliver dv" data-id="${o.id}">Delivered</button>`;
    return `<div class="order">
      <div class="ohead"><span style="font-weight:500;">${esc(o.customer_name)}</span>${statusPill}</div>
      ${o.customer_contact?`<p class="muted" style="margin:2px 0 0;">&#128222; <a href="tel:${esc(o.customer_contact)}" style="color:var(--info-fg);">${esc(o.customer_contact)}</a></p>`:''}
      <p class="muted" style="margin:2px 0 0;">${fmtDateTime(o.created_at)}</p>
      <div class="oitems">${itemLines}</div>
      <div class="ohead"><span class="otot">Total: <b>${peso(o.total)}</b></span><span class="muted">Payment after delivery</span></div>
      <div class="order-actions">${actions}</div>
    </div>`;
  }

  let body='';
  if(orgSubTab==='prepare'){
    const shownIds=new Set(shown.map(o=>o.id));
    const teamOfOrder={}; shown.forEach(o=>{ teamOfOrder[o.id]=o._team; });

    // aggregate qty + money subtotal per item across the shown orders
    const agg={}; // name -> {qty, amount}
    (allItems||[]).forEach(it=>{
      if(!shownIds.has(it.order_id)) return;
      const q=Number(it.qty||1), amt=Number(it.price||0)*q;
      const a=agg[it.name]||(agg[it.name]={qty:0,amount:0});
      a.qty+=q; a.amount+=amt;
    });
    const totalItems=Object.values(agg).reduce((s,a)=>s+a.qty,0);
    const prepDate = orgFilter.date==='all' ? 'all dates' : dayLabel(orgFilter.date);

    const orderCount=shown.length;
    const subtotal=Object.values(agg).reduce((s,a)=>s+a.amount,0); // sum of item subtotals
    const deliveryTotal=shown.reduce((s,o)=>s+Number(o.delivery_fee||0),0);
    const grandTotal=subtotal+deliveryTotal;

    const itemRows=Object.entries(agg)
      .sort((a,b)=>b[1].amount-a[1].amount)
      .map(([name,a])=>
        `<div class="prep-row"><span>${esc(name)}</span><span class="prep-row-right"><span class="prep-sub">${peso(a.amount)}</span><span class="prep-qty">${a.qty}\u00D7</span></span></div>`).join('');

    // collapsible breakdown by team/group (only when viewing all teams and >1 team present)
    let teamBreakdown='';
    if(orgFilter.team==='all'){
      const byTeam={}; // team -> {orders:Set, qty, amount}
      shown.forEach(o=>{ (byTeam[o._team]=byTeam[o._team]||{orders:new Set(),qty:0,amount:0}); });
      (allItems||[]).forEach(it=>{
        if(!shownIds.has(it.order_id)) return;
        const t=teamOfOrder[it.order_id]; const q=Number(it.qty||1);
        const g=byTeam[t]; g.orders.add(it.order_id); g.qty+=q; g.amount+=Number(it.price||0)*q;
      });
      const teamEntries=Object.entries(byTeam).sort((a,b)=>{
        if(a[0]==='No team') return 1; if(b[0]==='No team') return -1; return b[1].amount-a[1].amount;
      });
      if(teamEntries.length>1 && totalItems){
        const teamBlocks=teamEntries.map(([t,g])=>{
          const orderList=shown.filter(o=>o._team===t)
            .sort((a,b)=>String(a.customer_name||'').localeCompare(String(b.customer_name||'')))
            .map(o=>{
              const its=(byOrder[o.id]||[]).map(it=>
                `<div class="prep-ord-item"><span>${esc(it.name)}</span><span class="prep-ord-q">${Number(it.qty||1)}\u00D7</span></div>`).join('');
              return `<div class="prep-ord">
                  <div class="prep-ord-head"><span class="prep-ord-name">${esc(o.customer_name||'Customer')}</span><span class="prep-ord-amt">${peso(o.total)}</span></div>
                  ${its}
                </div>`;
            }).join('');
          return `<details class="prep-team">
              <summary class="prep-team-row">
                <span class="prep-team-caret">\u203A</span>
                <span class="prep-team-name">${esc(t)}</span>
                <span class="prep-team-meta">${g.orders.size} order${g.orders.size!==1?'s':''} \u00B7 ${g.qty} item${g.qty!==1?'s':''}</span>
                <span class="prep-team-amt">${peso(g.amount)}</span>
              </summary>
              <div class="prep-team-orders">${orderList}</div>
            </details>`;
        }).join('');
        teamBreakdown=`<div class="prep-teams"><p class="prep-teams-lbl">Breakdown by team / group</p>${teamBlocks}</div>`;
      }
    }

    const prepSummary = totalItems
      ? `<div class="prep-summary">
           <div class="prep-sum-row"><span>Orders</span><span>${orderCount}</span></div>
           ${deliveryTotal>0?`<div class="prep-sum-row"><span>Items subtotal</span><span>${peso(subtotal)}</span></div>
           <div class="prep-sum-row"><span>Delivery</span><span>${peso(deliveryTotal)}</span></div>`:''}
           <div class="prep-sum-row grand"><span>Grand total</span><span>${peso(grandTotal)}</span></div>
         </div>`
      : '';
    const prepBody = totalItems
      ? itemRows+teamBreakdown+prepSummary
      : '<p class="muted" style="margin:4px 0 0;">Nothing left to prepare \u2014 all delivered. \u{1F389}</p>';
    body=filterBar(true)+`<div class="prep"><h3>&#127859; To prepare \u2014 ${prepDate} (${totalItems} item${totalItems!==1?'s':''})</h3>${prepBody}</div>`;
  }
  else if(orgSubTab==='incoming'){
    const cards=shown.length? shown.map(activeCard).join('') : '<p class="muted">No active orders match this filter.</p>';
    const countNote=`<p class="muted" style="margin:0 0 8px;">Showing ${shown.length} of ${active.length} active order${active.length!==1?'s':''}</p>`;
    const batchScope = orgFilter.date==='all' ? 'all active orders' : dayLabel(orgFilter.date)+"'s orders";
    const batchBtn = shown.length
      ? `<button id="batch-deliver" class="primary" style="width:100%; margin:0 0 12px;">&#128666; Mark ${shown.length} order${shown.length!==1?'s':''} delivered (${batchScope})</button>`
      : '';
    body=filterBar(true)+`<h3>Incoming orders</h3>`+countNote+batchBtn+cards;
  }
  else if(orgSubTab==='history'){ // history
    if(!history.length){
      body=`<h3>&#128221; Order history</h3><p class="muted">No delivered orders yet.</p>`;
    } else {
      const histDateKeys=[...new Set(history.map(o=>dayKey(o.created_at)))].sort().reverse();
      const hShown=history.filter(o=> orgFilter.date==='all' || dayKey(o.created_at)===orgFilter.date);
      const histChips=`<button class="chip ${orgFilter.date==='all'?'active':''}" data-f="date" data-v="all">All dates</button>`+
        histDateKeys.map(k=>`<button class="chip ${orgFilter.date===k?'active':''}" data-f="date" data-v="${k}">${dayLabel(k)}</button>`).join('');
      const histFilter=`<div class="filters"><div><p class="filter-lbl">Filter by date</p><div class="filter-grp">${histChips}</div></div></div>`;
      const histRevenue=hShown.reduce((s,o)=>s+Number(o.total),0);
      const rated=hShown.filter(o=>o.review_rating);
      const avgRating = rated.length ? (rated.reduce((s,o)=>s+Number(o.review_rating),0)/rated.length) : 0;
      const ratingSummary = rated.length
        ? `<div class="card"><div class="rating-summary"><span class="rating-big">${avgRating.toFixed(1)}</span><div>${starsRO(Math.round(avgRating))}<p class="muted" style="margin:2px 0 0;">${rated.length} review${rated.length!==1?'s':''} \u00B7 ${orgFilter.date==='all'?'all dates':dayLabel(orgFilter.date)}</p></div></div></div>`
        : '';
      const histSummary=`<div class="stats">
        <div class="stat"><p class="lbl">Delivered</p><p class="val">${hShown.length}</p></div>
        <div class="stat"><p class="lbl">Reviews</p><p class="val">${rated.length}</p></div>
        <div class="stat"><p class="lbl">Revenue</p><p class="val">${peso(histRevenue)}</p></div>
      </div>`+ratingSummary;
      const histCards=hShown.length? hShown.map(o=>{
        const payPill = o.paid
          ? '<span class="pill p-delivered">Paid \u2713</span>'
          : (o.proof_url?'<span class="pill p-conf">Proof received</span>':'<span class="pill p-pending">Unpaid</span>');
        const itemLines=itemLinesHtml(byOrder[o.id])+deliveryLineHtml(o.delivery_fee);
        const reviewHtml = o.review_rating
          ? `<div class="review-box"><div class="row" style="justify-content:space-between;"><span style="font-weight:500; font-size:.82rem;">Customer review</span>${starsRO(o.review_rating)}</div>${o.review_text?`<p class="review-quote">\u201C${esc(o.review_text)}\u201D</p>`:''}</div>`
          : '';
        const proofGone = !o.proof_url && o.proof_expired
          ? `<span class="small-btn" style="opacity:.6; cursor:default;" title="Proof files are auto-deleted after 30 days to save storage">&#128465;&#65039; Proof expired</span>`
          : '';
        if(!o.paid){
          actions = o.proof_url
            ? `<a class="small-btn" href="${esc(o.proof_url)}" target="_blank" style="text-decoration:none;">View proof</a>
               <button class="small-btn primary pd" data-id="${o.id}">Confirm payment</button>`
            : `<button class="small-btn undo" data-id="${o.id}">Undo delivered</button>
               ${proofGone || '<button class="small-btn" disabled>Pending payment</button>'}
               <button class="small-btn primary pd" data-id="${o.id}">Confirm payment</button>`;
        } else {
          actions = o.proof_url
            ? `<a class="small-btn deliver" href="${esc(o.proof_url)}" target="_blank" style="text-decoration:none;">View proof</a>`
            : `${proofGone || '<span class="muted" style="font-size:.82rem;">Payment confirmed</span>'}`;
        }
        return `<div class="order" style="opacity:.92;">
          <div class="ohead"><span style="font-weight:500;">${esc(o.customer_name)}</span>${payPill}</div>
          ${o.customer_contact?`<p class="muted" style="margin:2px 0 0;">&#128222; <a href="tel:${esc(o.customer_contact)}" style="color:var(--info-fg);">${esc(o.customer_contact)}</a></p>`:''}
          <p class="muted" style="margin:2px 0 0;">${fmtDateTime(o.created_at)}</p>
          <div class="oitems">${itemLines}</div>
          <div class="ohead"><span class="otot">Total: <b>${peso(o.total)}</b></span></div>
          ${reviewHtml}
          <div class="order-actions">${actions}</div>
        </div>`;
      }).join('') : '<p class="muted">No delivered orders on this date.</p>';
      body=`<h3>&#128221; Order history</h3>`+histFilter+histSummary+histCards;
    }
  }
  else if(orgSubTab==='analytics'){
    // Analytics over all DELIVERED orders for this organizer (full history).
    const deliveredIds=new Set(history.map(o=>o.id));
    // Top ordered items by total quantity
    const qtyAgg={};
    (allItems||[]).forEach(it=>{ if(deliveredIds.has(it.order_id)) qtyAgg[it.name]=(qtyAgg[it.name]||0)+Number(it.qty||1); });
    const ranked=Object.entries(qtyAgg).sort((a,b)=>b[1]-a[1]);
    const maxQty=ranked.length?ranked[0][1]:0;
    const totalUnits=ranked.reduce((s,[,n])=>s+n,0);

    // Reviews across all delivered orders
    const reviewed=history.filter(o=>o.review_rating).sort((a,b)=>new Date(b.reviewed_at||b.created_at)-new Date(a.reviewed_at||a.created_at));
    const avgAll = reviewed.length ? (reviewed.reduce((s,o)=>s+Number(o.review_rating),0)/reviewed.length) : 0;
    // rating distribution 5..1
    const dist=[0,0,0,0,0];
    reviewed.forEach(o=>{ dist[5-o.review_rating]++; });

    const topBody = ranked.length
      ? ranked.slice(0,15).map(([name,qty],i)=>`<div class="rank-row">
          <span class="rank-num">${i+1}</span>
          <span class="rank-name">${esc(name)}</span>
          <span class="rank-bar-wrap"><span class="rank-bar" style="width:${maxQty?Math.round(qty/maxQty*100):0}%;"></span></span>
          <span class="rank-qty">${qty}\u00D7</span>
        </div>`).join('')
      : '<p class="muted" style="margin:4px 0 0;">No delivered orders yet \u2014 analytics will appear once you deliver orders.</p>';

    const distBody = reviewed.length
      ? [5,4,3,2,1].map(star=>{
          const n=dist[5-star], pct=reviewed.length?Math.round(n/reviewed.length*100):0;
          return `<div class="rank-row" style="padding:7px 0;">
            <span style="flex-shrink:0; width:40px; color:var(--text-2); font-size:.85rem;">${star}\u2605</span>
            <span class="rank-bar-wrap"><span class="rank-bar" style="width:${pct}%;"></span></span>
            <span class="rank-qty">${n}</span></div>`;
        }).join('')
      : '';

    // Feedback list: filter by food ordered + sort by review date (orgRevFilter).
    const revFoodSet=new Set();
    reviewed.forEach(o=>(byOrder[o.id]||[]).forEach(it=>revFoodSet.add(it.name)));
    const revFoods=[...revFoodSet].sort((a,b)=>a.localeCompare(b));
    let fbRows=reviewed.slice();
    if(orgRevFilter.food) fbRows=fbRows.filter(o=>(byOrder[o.id]||[]).some(it=>it.name===orgRevFilter.food));
    fbRows.sort((a,b)=>{
      const ta=new Date(a.reviewed_at||a.created_at), tb=new Date(b.reviewed_at||b.created_at);
      return orgRevFilter.dir==='asc'? ta-tb : tb-ta;
    });
    const fbControls = reviewed.length
      ? `<div class="row" style="gap:8px; margin:6px 0 12px;">
          <select id="orev-food" style="height:2.4rem; flex:1; font-size:.85rem;">
            ${['<option value="">All food</option>'].concat(revFoods.map(f=>`<option value="${esc(f)}"${f===orgRevFilter.food?' selected':''}>${esc(f)}</option>`)).join('')}
          </select>
          <button class="reset" id="orev-sort" style="height:2.4rem; flex:0 0 auto; padding:0 12px; font-size:.82rem; font-weight:600; border:0.5px solid var(--border-2); border-radius:var(--radius-sm); white-space:nowrap;">${orgRevFilter.dir==='desc'?'Newest \u2193':'Oldest \u2191'}</button>
        </div>`
      : '';
    const fbBody = reviewed.length
      ? (fbRows.length
          ? fbRows.map(o=>`<div class="fb-item">
              <div class="fb-head"><span style="font-weight:500; font-size:.78rem; color:var(--text-2);">${esc(o.customer_name)}</span>${starsRO(o.review_rating)}</div>
              <div class="oitems" style="margin:6px 0 0;">${itemLinesHtml(byOrder[o.id])}</div>
              ${o.review_text?`<p class="review-quote" style="margin-top:7px;">\u201C${esc(o.review_text)}\u201D</p>`:'<p class="muted" style="margin-top:6px; font-size:.8rem;">No comment left.</p>'}
              <span class="muted" style="display:inline-block; margin:7px 0 0; font-size:.68rem; opacity:.75;">${fmtDateShort(o.reviewed_at||o.created_at)}</span>
            </div>`).join('')
          : '<p class="muted" style="font-size:.85rem;">No reviews match this filter.</p>')
      : '<p class="muted">No feedback yet. Reviews customers leave will show up here.</p>';

    body=`<h3>&#128202; Analytics</h3>
      <div class="stats">
        <div class="stat"><p class="lbl">Items sold</p><p class="val">${totalUnits}</p></div>
        <div class="stat"><p class="lbl">Avg rating</p><p class="val">${reviewed.length?avgAll.toFixed(1):'\u2014'}</p></div>
        <div class="stat"><p class="lbl">Reviews</p><p class="val">${reviewed.length}</p></div>
      </div>
      <div class="card"><h3>&#127942; Top ordered items <span class="muted" style="font-weight:400; font-size:.8rem;">(all time, by quantity)</span></h3>${topBody}</div>
      ${reviewed.length?`<div class="card"><h3>&#11088; Rating breakdown</h3>${distBody}</div>`:''}
      <h3 style="margin-top:1.25rem;">&#128172; Feedback history</h3>${fbControls}${fbBody}`;
  }

  el.innerHTML=subbar+body;
  el.querySelectorAll('.subtabs button').forEach(b=>b.onclick=()=>{ orgSubTab=b.dataset.sub; loadOrgOrders(menu); });
  el.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{ orgFilter[b.dataset.f]=b.dataset.v; loadOrgOrders(menu); });
  const orevFood=el.querySelector('#orev-food');
  if(orevFood) orevFood.onchange=()=>{ orgRevFilter.food=orevFood.value; loadOrgOrders(menu); };
  const orevSort=el.querySelector('#orev-sort');
  if(orevSort) orevSort.onclick=()=>{ orgRevFilter.dir = orgRevFilter.dir==='desc'?'asc':'desc'; loadOrgOrders(menu); };
  el.querySelectorAll('.cf').forEach(b=>b.onclick=async()=>{await sb.from('orders').update({status:'confirmed'}).eq('id',b.dataset.id); loadOrgOrders(menu);});
  el.querySelectorAll('.unc').forEach(b=>b.onclick=async()=>{await sb.from('orders').update({status:'new'}).eq('id',b.dataset.id); loadOrgOrders(menu);});
  el.querySelectorAll('.dv').forEach(b=>b.onclick=()=>singleDeliver(b.dataset.id, menu));
  el.querySelectorAll('.undo').forEach(b=>b.onclick=async()=>{await sb.from('orders').update({delivered:false}).eq('id',b.dataset.id); loadOrgOrders(menu);});
  el.querySelectorAll('.pd').forEach(b=>b.onclick=async()=>{await sb.from('orders').update({paid:true}).eq('id',b.dataset.id); loadOrgOrders(menu);});
  const bd=el.querySelector('#batch-deliver');
  if(bd) bd.onclick=()=>batchDeliver(shown, byOrder, menu);
}

// Mark a batch of active orders delivered. The organizer ticks which orders
// were actually delivered; an optional delivery fee is split evenly across the
// unique checked customers (and across each customer's checked orders).
function batchDeliver(batch, byOrder, menu){
  if(!batch.length){ return; }
  const rows=batch.map(o=>
    `<label class="bd-row">
       <input type="checkbox" class="bd-chk" data-id="${o.id}" data-cust="${esc(String(o.customer_id))}" checked>
       <span class="bd-name">${esc(o.customer_name)}</span>
       <span class="price">${peso(o.total)}</span>
     </label>`).join('');
  const bodyHtml=`
    <p class="muted" style="margin:0 0 10px;">Tick the orders that were delivered. The delivery fee (if any) is split evenly across the checked customers.</p>
    <div class="bd-list">${rows}</div>
    <label class="fld" style="margin-top:12px;">Total delivery fee (optional)</label>
    <input type="text" id="bd-fee" inputmode="decimal" placeholder="e.g. 100" style="width:100%; margin-bottom:8px;">
    <p id="bd-readout" class="muted" style="margin:0;"></p>`;

  const bd=$('modal-backdrop');
  $('modal-title').textContent='Mark orders delivered';
  $('modal-body').innerHTML=bodyHtml;
  $('modal-input-wrap').classList.add('hide');
  $('modal-ok').textContent='Deliver selected';
  $('modal-cancel').textContent='Cancel';
  bd.classList.remove('hide');

  const chks=()=>[...$('modal-body').querySelectorAll('.bd-chk')];
  const checkedOrders=()=> chks().filter(c=>c.checked).map(c=>c.dataset.id);
  const updateReadout=()=>{
    const checked=chks().filter(c=>c.checked);
    const custSet=new Set(checked.map(c=>c.dataset.cust));
    const n=checked.length, cust=custSet.size;
    const fee=Number($('bd-fee').value)||0;
    const per = (fee>0 && cust>0) ? fee/cust : 0;
    $('bd-readout').innerHTML = n===0
      ? 'No orders selected.'
      : `${n} order${n!==1?'s':''} \u00B7 ${cust} customer${cust!==1?'s':''}`+
        (fee>0?` \u00B7 delivery ${peso(Math.round(per*100)/100)} each`:'');
    $('modal-ok').disabled = (n===0);
  };
  $('modal-body').querySelectorAll('.bd-chk').forEach(c=>c.onchange=updateReadout);
  $('bd-fee').oninput=updateReadout;
  updateReadout();

  const close=()=>{ bd.classList.add('hide'); $('modal-ok').onclick=null; $('modal-cancel').onclick=null; bd.onclick=null; $('modal-ok').disabled=false; };
  $('modal-cancel').onclick=close;
  bd.onclick=e=>{ if(e.target===bd) close(); };
  $('modal-ok').onclick=async()=>{
    const selected=checkedOrders();
    if(!selected.length) return;
    const fee=Number($('bd-fee').value)||0;
    if(fee<0){ return; }
    const chosen=batch.filter(o=>selected.includes(String(o.id)));
    close();
    await applyBatchDeliver(chosen, fee, menu);
  };
}

async function applyBatchDeliver(chosen, fee, menu){
  const custSet=new Set(chosen.map(o=>String(o.customer_id)));
  const custCount=custSet.size;
  const byCust={};
  chosen.forEach(o=>{ (byCust[o.customer_id]=byCust[o.customer_id]||[]).push(o); });
  const perCustomer = fee>0 ? fee/custCount : 0;
  const updates=[];
  Object.values(byCust).forEach(orders=>{
    const share = perCustomer>0 ? perCustomer/orders.length : 0; // split a customer's share across their orders
    orders.forEach(o=>{
      const baseTotal = Number(o.total) - Number(o.delivery_fee||0); // strip prior fee so re-runs don't stack
      const newFee = Math.round(share*100)/100;
      const newTotal = Math.round((baseTotal + newFee)*100)/100;
      updates.push({ id:o.id, delivery_fee:newFee, total:newTotal });
    });
  });
  for(const u of updates){
    await sb.from('orders').update({ delivered:true, status:'confirmed', delivery_fee:u.delivery_fee, total:u.total }).eq('id', u.id);
  }
  if(fee>0){
    await uiConfirm('Delivered \u2713', `${chosen.length} order(s) marked delivered.<br>Delivery fee ${peso(fee)} split across ${custCount} customer(s) = ${peso(Math.round(perCustomer*100)/100)} each.`);
  } else {
    await uiConfirm('Delivered \u2713', `${chosen.length} order(s) marked delivered. No delivery fee added.`);
  }
  loadOrgOrders(menu);
}

// Mark a SINGLE active order delivered. Prompts the organizer for an optional
// delivery fee (blank or 0 = none). The fee is stored on the order and added to
// its total; any prior fee is stripped first so re-runs don't stack.
async function singleDeliver(orderId, menu){
  const {data:o}=await sb.from('orders').select('*').eq('id',orderId).single();
  if(!o){ return; }
  const raw=await uiPrompt('Mark delivered',
    `Delivery fee for this order? Leave blank or enter 0 if there\u2019s no delivery fee.`,
    'e.g. 30 (optional)');
  if(raw===null){ return; } // cancelled
  const fee=Math.max(0, Number(String(raw).replace(/[^0-9.]/g,''))||0);
  const baseTotal = Number(o.total) - Number(o.delivery_fee||0); // strip prior fee
  const newTotal = Math.round((baseTotal + fee)*100)/100;
  await sb.from('orders').update({ delivered:true, status:'confirmed', delivery_fee:fee, total:newTotal }).eq('id', orderId);
  if(fee>0){
    await uiConfirm('Delivered \u2713', `Order marked delivered.<br>Delivery fee ${peso(fee)} added \u2014 new total ${peso(newTotal)}.`);
  } else {
    await uiConfirm('Delivered \u2713', `Order marked delivered. No delivery fee added.`);
  }
  loadOrgOrders(menu);
}

// ---------- ADMIN ----------
async function viewAdmin(){
  const v=$('view');
  v.innerHTML='<h2>Organizer applications</h2><p class="muted">Loading...</p>';
  const {data:apps}=await sb.from('profiles').select('*').eq('role','organizer').eq('status','pending').order('created_at');
  let html='<h2>Organizer applications</h2>';
  html+= (apps&&apps.length)? apps.map(a=>`<div class="order">
      <div class="row" style="justify-content:space-between;"><span style="font-weight:500;">${esc(a.display_name)}</span><span class="pill p-pending">Pending</span></div>
      <p class="muted" style="margin:6px 0;">${esc(a.email)}</p>
      <div class="order-actions">
        <button class="small-btn primary ap" data-id="${a.id}">Approve</button>
        <button class="small-btn rj" data-id="${a.id}">Reject</button>
      </div></div>`).join('') : '<p class="muted">No pending applications.</p>';
  // approved organizers list
  const {data:orgs}=await sb.from('profiles').select('*').eq('role','organizer').eq('status','approved').order('display_name');
  html+='<h2 style="margin-top:1.5rem;">Approved organizers</h2>';
  html+= (orgs&&orgs.length)? orgs.map(o=>`<div class="order"><div class="row" style="justify-content:space-between;"><span style="font-weight:500;">${esc(o.display_name)}</span><button class="small-btn rm" data-id="${o.id}">Revoke</button></div><p class="muted" style="margin:6px 0 0;">${esc(o.email)}</p></div>`).join('') : '<p class="muted">None yet.</p>';
  v.innerHTML=html;
  v.querySelectorAll('.ap').forEach(b=>b.onclick=async()=>{await sb.from('profiles').update({status:'approved'}).eq('id',b.dataset.id); viewAdmin();});
  v.querySelectorAll('.rj').forEach(b=>b.onclick=async()=>{await sb.from('profiles').update({role:'customer',status:'approved'}).eq('id',b.dataset.id); viewAdmin();});
  v.querySelectorAll('.rm').forEach(b=>b.onclick=async()=>{if(confirm('Revoke organizer access?')){await sb.from('profiles').update({role:'customer'}).eq('id',b.dataset.id); viewAdmin();}});
}

// ---------- ACCOUNT ----------
async function viewAccount(){
  const v=$('view');
  let roleLabel = me.role==='admin'?'Admin':(me.role==='organizer'?(me.status==='approved'?'Organizer':'Organizer (pending approval)'):'Customer');
  let html=`<h2>Account</h2>
    <div class="card">
      <label class="fld">Display name</label>
      <input type="text" id="acc-name" value="${esc(me.display_name||'')}" style="margin-bottom:10px;">
      <label class="fld">Contact number</label>
      <input type="text" id="acc-contact" value="${esc(me.contact||'')}" inputmode="tel" placeholder="e.g. 0917 123 4567" style="margin-bottom:4px;">
      <p class="muted" style="font-size:.74rem; margin:0 0 10px;">Shown to organizers on your orders so they can reach you for pickup or delivery.</p>
      <label class="fld">Team / group <span class="muted">(optional)</span></label>
      ${teamSelectHtml('acc-team', me.team)}
      <button id="acc-save" class="small-btn">Save</button>
      <p class="muted" style="margin:12px 0 0;">${esc(me.email)} \u00B7 ${roleLabel}</p>
    </div>`;
  if(me.role==='customer'){
    html+=`<div class="card"><h3>Become an organizer</h3>
      <p class="muted" style="margin:0 0 10px;">Apply to post your own daily menu. The admin will review your request.</p>
      <label class="fld">Payment QR <span style="color:var(--danger-fg);">*</span></label>
      <p class="muted" style="font-size:.74rem; margin:0 0 6px;">Upload your GCash / Maya / bank QR. Customers scan this to pay after delivery. Required to apply \u2014 you can change it later.</p>
      <input type="file" accept="image/*" id="apply-qr" style="font-size:.88rem; margin-bottom:6px;">
      <div id="apply-qr-preview"></div>
      <button id="apply" class="primary" style="width:100%; margin-top:8px;">Apply to be an organizer</button></div>`;
  } else if(me.role==='organizer' && me.status==='pending'){
    html+=`<div class="card"><p style="color:var(--warn-fg); margin:0;">&#9203; Your organizer application is pending admin approval.</p></div>`;
  }
  v.innerHTML=html;
  $('acc-save').onclick=async()=>{
    const n=$('acc-name').value.trim(); if(!n){ alert('Name cannot be empty.'); return; }
    const c=$('acc-contact').value.trim();
    const t=$('acc-team').value.trim();
    await sb.from('profiles').update({display_name:n, contact:c||null, team:t||null}).eq('id',me.id);
    me.display_name=n; me.contact=c||null; me.team=t||null; alert('Saved.');
  };
  if($('apply')){
    let pendingQRFile=null;
    const qrInput=$('apply-qr');
    qrInput.onchange=e=>{
      pendingQRFile=e.target.files[0]||null;
      const prev=$('apply-qr-preview');
      if(pendingQRFile){ const url=URL.createObjectURL(pendingQRFile); prev.innerHTML=`<img src="${url}" alt="QR preview" style="max-width:160px; border:0.5px solid var(--border-2); border-radius:var(--radius-sm); margin-top:4px;">`; }
      else prev.innerHTML='';
    };
    $('apply').onclick=async()=>{
      if(!pendingQRFile){ alert('Please upload your payment QR first \u2014 it\u2019s required to become an organizer.'); return; }
      if(!confirm('Apply to be an organizer?')) return;
      const ok=await uploadQR(pendingQRFile);
      if(!ok) return;
      await sb.from('profiles').update({role:'organizer',status:'pending'}).eq('id',me.id);
      me.role='organizer'; me.status='pending'; alert('Application sent! The admin will review it.'); buildTabs();
    };
  }
}

const routes={ browse:viewBrowse, myorders:viewMyOrders, organizer:viewOrganizer, admin:viewAdmin, account:viewAccount };

boot();
